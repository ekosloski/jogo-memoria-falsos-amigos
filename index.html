<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória - Falsos Amigos</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#fff7e6,#eaf3ff);color:#222;text-align:center}
header{padding:22px 12px 10px}
h1{margin:0;color:#b21f1f;font-size:32px}
.sub{margin-top:6px;color:#333;font-size:16px}
.painel{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:12px auto 18px}
.info,button{background:white;border:2px solid #b21f1f;border-radius:12px;padding:10px 16px;font-weight:bold;box-shadow:0 3px 8px #0002}
button{cursor:pointer;color:white;background:#b21f1f;font-size:15px}
button:hover{background:#8f1818}
.tabuleiro{width:min(1100px,96vw);margin:0 auto 30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.carta{height:105px;perspective:900px;cursor:pointer}
.miolo{position:relative;width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d}
.carta.virada .miolo,.carta.encontrada .miolo{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:2px solid #9f1f1f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;box-shadow:0 4px 10px #0002}
.frente{background:#b21f1f;color:white;font-size:38px}
.verso{background:white;transform:rotateY(180deg)}
.palavra{font-size:18px;font-weight:900;color:#b21f1f;text-transform:uppercase;line-height:1.05}
.pt .palavra{color:#06469b}
.icone{font-size:28px;margin-top:4px}
.tipo{font-size:11px;margin-top:4px;color:#555;font-weight:bold}
.modal{display:none;position:fixed;inset:0;background:#0007;align-items:center;justify-content:center;padding:20px;z-index:10}
.modal-box{background:white;border-radius:18px;max-width:430px;width:100%;padding:22px;border:4px solid #b21f1f;box-shadow:0 8px 30px #0005;text-align:left}
.modal-box h2{text-align:center;color:#b21f1f;margin-top:0}
.modal-box p{font-size:17px;line-height:1.35}
.modal-box button{display:block;margin:18px auto 0}
footer{font-size:13px;color:#555;padding-bottom:20px}
</style>
</head>
<body>
<header>
<h1>Jogo da Memória: Falsos Amigos</h1>
<div class="sub">Encontre o par: palavra em espanhol + significado em português</div>
</header>
<div class="painel">
<div class="info">Tentativas: <span id="tentativas">0</span></div>
<div class="info">Pares: <span id="pares">0</span>/20</div>
<div class="info">Tempo: <span id="tempo">00:00</span></div>
<button onclick="reiniciar()">Reiniciar</button>
</div>
<main class="tabuleiro" id="tabuleiro"></main>
<div class="modal" id="modal">
<div class="modal-box">
<h2 id="modalTitulo"></h2>
<p id="modalTexto"></p>
<button onclick="fecharModal()">Continuar</button>
</div>
</div>
<footer>Material didático de espanhol: falsos amigos português-espanhol.</footer>
<script>
const dados=[
{es:"Embarazada",pt:"Grávida",ic:"🤰",sig:"grávida",nao:"embaraçada",ex:"Mi hermana está embarazada."},
{es:"Ropa",pt:"Roupa",ic:"👕",sig:"roupa, vestuário",nao:"roupa rasgada",ex:"Compré ropa nueva."},
{es:"Exquisito",pt:"Delicioso",ic:"🍰",sig:"delicioso, excelente",nao:"esquisito",ex:"La comida está exquisita."},
{es:"Pasta",pt:"Macarrão",ic:"🍝",sig:"macarrão",nao:"pasta de documentos",ex:"Me gusta la pasta italiana."},
{es:"Taza",pt:"Xícara",ic:"☕",sig:"xícara",nao:"taça",ex:"Quiero una taza de café."},
{es:"Vaso",pt:"Copo",ic:"🥛",sig:"copo",nao:"vaso de planta",ex:"Necesito un vaso de agua."},
{es:"Apellido",pt:"Sobrenome",ic:"🪪",sig:"sobrenome",nao:"apelido",ex:"Mi apellido es García."},
{es:"Oficina",pt:"Escritório",ic:"💻",sig:"escritório",nao:"oficina mecânica",ex:"Trabajo en una oficina."},
{es:"Largo",pt:"Comprido",ic:"📏",sig:"comprido",nao:"largo/amplo",ex:"Tiene el pelo largo."},
{es:"Sensible",pt:"Sensível",ic:"❤️",sig:"emotivo, sensível",nao:"sensato",ex:"Es una persona muy sensible."},
{es:"Rato",pt:"Momento",ic:"⏳",sig:"momento, um tempo",nao:"rato animal",ex:"Espera un rato."},
{es:"Firma",pt:"Assinatura",ic:"✍️",sig:"assinatura",nao:"empresa",ex:"Pon tu firma aquí."},
{es:"Polvo",pt:"Poeira",ic:"🌫️",sig:"poeira",nao:"polvo animal",ex:"Hay mucho polvo en la mesa."},
{es:"Aceite",pt:"Óleo",ic:"🫒",sig:"óleo",nao:"somente azeite",ex:"El aceite de oliva es saludable."},
{es:"Borrar",pt:"Apagar",ic:"🧽",sig:"apagar",nao:"borrar/manchar",ex:"Voy a borrar el texto."},
{es:"Goma",pt:"Borracha",ic:"🧼",sig:"borracha",nao:"goma de mascar",ex:"Necesito una goma para borrar."},
{es:"Pronto",pt:"Logo, em breve",ic:"🕒",sig:"logo, em breve",nao:"preparado",ex:"Volveré pronto."},
{es:"Contestar",pt:"Responder",ic:"💬",sig:"responder",nao:"contestar/reclamar",ex:"Ella contestó la pregunta."},
{es:"Colegio",pt:"Escola",ic:"🏫",sig:"escola",nao:"colégio privado",ex:"Mi hijo estudia en un colegio."},
{es:"Balcón",pt:"Sacada/varanda",ic:"🪟",sig:"sacada, varanda",nao:"balcão",ex:"Salió al balcón."}
];
let abertas=[],bloqueado=false,tentativas=0,pares=0,segundos=0,timer=null;
function embaralhar(lista){return lista.sort(()=>Math.random()-0.5)}
function iniciar(){
let cartas=[];
dados.forEach((d,i)=>{cartas.push({...d,id:i,texto:d.es,tipo:"Espanhol",classe:"es"});cartas.push({...d,id:i,texto:d.pt,tipo:"Português",classe:"pt"})});
cartas=embaralhar(cartas);
document.getElementById("tabuleiro").innerHTML="";
cartas.forEach((carta,index)=>criarCarta(carta,index));
iniciarTimer();
}
function criarCarta(carta,index){
const div=document.createElement("div");
div.className="carta "+carta.classe;
div.dataset.id=carta.id;div.dataset.index=index;
div.innerHTML=`<div class="miolo"><div class="face frente">?</div><div class="face verso"><div class="palavra">${carta.texto}</div><div class="icone">${carta.ic}</div><div class="tipo">${carta.tipo}</div></div></div>`;
div.onclick=()=>virar(div);
document.getElementById("tabuleiro").appendChild(div);
}
function virar(carta){
if(bloqueado||carta.classList.contains("virada")||carta.classList.contains("encontrada"))return;
carta.classList.add("virada");abertas.push(carta);
if(abertas.length===2){tentativas++;document.getElementById("tentativas").textContent=tentativas;verificar()}
}
function verificar(){
const [a,b]=abertas;
const acerto=a.dataset.id===b.dataset.id&&a.className!==b.className;
if(acerto){
a.classList.add("encontrada");b.classList.add("encontrada");pares++;document.getElementById("pares").textContent=pares;mostrarExplicacao(Number(a.dataset.id));abertas=[];
if(pares===dados.length){clearInterval(timer);setTimeout(()=>alert("Parabéns! Você completou o jogo!"),400)}
}else{
bloqueado=true;
setTimeout(()=>{a.classList.remove("virada");b.classList.remove("virada");abertas=[];bloqueado=false},850)
}
}
function mostrarExplicacao(id){
const d=dados[id];
document.getElementById("modalTitulo").textContent=d.es+" = "+d.pt;
document.getElementById("modalTexto").innerHTML=`✅ <b>Significa:</b> ${d.sig}.<br>❌ <b>Não significa:</b> ${d.nao}.<br><br>✏️ <b>Exemplo:</b><br><i>${d.ex}</i>`;
document.getElementById("modal").style.display="flex";
}
function fecharModal(){document.getElementById("modal").style.display="none"}
function iniciarTimer(){
clearInterval(timer);
timer=setInterval(()=>{segundos++;const m=String(Math.floor(segundos/60)).padStart(2,"0");const s=String(segundos%60).padStart(2,"0");document.getElementById("tempo").textContent=`${m}:${s}`},1000)
}
function reiniciar(){
abertas=[];bloqueado=false;tentativas=0;pares=0;segundos=0;
document.getElementById("tentativas").textContent="0";document.getElementById("pares").textContent="0";document.getElementById("tempo").textContent="00:00";fecharModal();iniciar()
}
iniciar();
</script>
</body>
</html>
